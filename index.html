<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMINALLYDEV DADS - Game Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            border-bottom: 3px solid #00ff88;
        }
        
        .header-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .header-subtitle {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        
        button {
            background: #1a1a2e;
            color: #00ff88;
            border: 2px solid #00ff88;
            padding: 10px 25px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        button:hover,
        button.active {
            background: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }
        
        .game-card {
            background: #16213e;
            border: 2px solid #00ff88;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .game-card:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            transform: translateY(-5px);
            border-color: #00ffff;
        }
        
        .game-thumbnail {
            width: 100%;
            height: 200px;
            background: #0a0e27;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }
        
        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .game-type {
            display: inline-block;
            background: #00ff88;
            color: #0a0e27;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 8px;
            width: fit-content;
            text-transform: uppercase;
        }
        
        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffff;
        }
        
        .game-description {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.4;
            flex: 1;
            margin-bottom: 15px;
        }
        
        .game-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-play,
        .btn-download {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        .btn-play {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .btn-play:hover {
            background: #00ffff;
        }
        
        .btn-download {
            background: #ff6b35;
            color: #fff;
        }
        
        .btn-download:hover {
            background: #ff8c42;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background: #16213e;
            margin: 5% auto;
            padding: 30px;
            border: 2px solid #00ff88;
            width: 90%;
            max-width: 800px;
            border-radius: 8px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .close {
            color: #00ff88;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .close:hover {
            color: #00ffff;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .support-section {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border: 2px solid #00ff88;
            border-radius: 8px;
            margin: 60px 0;
        }
        
        .support-title {
            font-size: 1.8rem;
            color: #00ff88;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .support-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-support {
            padding: 15px 40px;
            font-size: 1rem;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-support:hover {
            background: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }
        
        .coming-soon {
            background: #ff6b35;
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.7;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 2px solid #00ff88;
            margin-top: 60px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .header-title {
                font-size: 2rem;
            }
            
            .game-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">⚔️ CRIMINALLYDEV DADS</div>
            <div class="header-subtitle">EST. 2026 // GAME HUB // INDIE COLLECTIVE</div>
        </header>
        
        <div class="filter-buttons">
            <button class="active" onclick="filterGames('all')">ALL</button>
            <button onclick="filterGames('game')">GAMES</button>
            <button onclick="filterGames('asset')">ASSETS</button>
        </div>
        
        <div class="game-grid" id="gameGrid"></div>
        
        <div class="support-section">
            <div class="support-title">Support the Devs</div>
            <p style="margin-bottom: 30px; color: #aaa; font-size: 0.95rem;">
                Love our games? Help us keep creating by supporting our work. <span class="coming-soon">COMING SOON</span>
            </p>
            <div class="support-buttons">
                <button class="btn-support" disabled style="opacity: 0.5;">💰 Donate</button>
                <button class="btn-support" disabled style="opacity: 0.5;">🛒 Merch Shop</button>
                <button class="btn-support" onclick="window.location.href='mailto:contact@criminallydevdads.com'">📧 Contact Us</button>
            </div>
        </div>
        
        <footer>
            © 2026 CRIMINALLYDEV DADS LLC // ALL RIGHTS RESERVED // STAY CRIMINAL
        </footer>
    </div>
    
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        let allGames = [];
        
        function slugFromFilename(filename) {
            return filename.replace(/\.zip$/i, '');
        }

        async function markPlayableGames(games) {
            const checks = games.map(async (game) => {
                const gameIndexPath = `games/${slugFromFilename(game.filename)}/index.html`;
                try {
                    const response = await fetch(gameIndexPath, { cache: 'no-store' });
                    game.isPlayable = response.ok;
                } catch (error) {
                    game.isPlayable = false;
                }
                return game;
            });

            return Promise.all(checks);
        }

        // Load games from JSON
        fetch('games.json')
            .then(response => response.json())
            .then(data => markPlayableGames(data))
            .then(data => {
                allGames = data;
                renderGames('all');
            })
            .catch(error => {
                console.error('Error loading games:', error);
                document.getElementById('gameGrid').innerHTML = '<div class="empty-state">Error loading games. Check console.</div>';
            });
        
        function renderGames(type) {
            const gameGrid = document.getElementById('gameGrid');
            const filteredGames = type === 'all' ? allGames : allGames.filter(g => g.type === type);
            
            if (filteredGames.length === 0) {
                gameGrid.innerHTML = '<div class="empty-state">No games found in this category.</div>';
                return;
            }
            
            gameGrid.innerHTML = filteredGames.map(game => `
                <div class="game-card">
                    <div class="game-thumbnail">
                        ${game.thumbnail ? `<img src="${game.thumbnail}" alt="${game.title}">` : '🎮'}
                    </div>
                    <div class="game-info">
                        <div class="game-type">${game.type}</div>
                        <div class="game-title">${game.title}</div>
                        <div class="game-description">${game.description}</div>
                        <div class="game-actions">
                            <button class="btn-play" onclick="playGame('${game.filename}', ${game.isPlayable})">${game.isPlayable ? 'Play Now' : 'Setup Needed'}</button>
                            <button class="btn-download" onclick="openModal('${game.id}')">Info</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterGames(type) {
            document.querySelectorAll('.filter-buttons button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGames(type);
        }
        
        function playGame(filename, isPlayable = true) {
            if (!isPlayable) {
                alert(`"${filename}" is listed in games.json but is not set up yet.\n\nCreate this folder and place game files inside:\ngames/${slugFromFilename(filename)}/index.html`);
                return;
            }

            window.location.href = `games/${slugFromFilename(filename)}/index.html`;
        }
        
        function openModal(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;
            
            const modal = document.getElementById('gameModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="color: #00ff88; margin-bottom: 20px;">${game.title}</h2>
                ${game.thumbnail ? `<img src="${game.thumbnail}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 6px; margin-bottom: 20px;">` : ''}
                <p style="margin-bottom: 15px; line-height: 1.6;">${game.details || game.description}</p>
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #00ff88;">
                    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
                        <strong>Type:</strong> ${game.type.toUpperCase()} | 
                        <strong>File:</strong> ${game.filename}
                    </p>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <button onclick="playGame('${game.filename}', ${game.isPlayable})" style="flex: 1; padding: 12px; background: #00ff88; color: #0a0e27; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">${game.isPlayable ? 'PLAY NOW' : 'SETUP NEEDED'}</button>
                        <button onclick="closeModal()" style="flex: 1; padding: 12px; background: #555; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">CLOSE</button>
                    </div>
                </div>
            `;
            
            modal.style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
