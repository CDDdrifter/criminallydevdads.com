<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMINALLY DEV DADS - Game Hub</title>
    <style>
        :root {
            --bg-0: #05070d;
            --bg-1: #0d111a;
            --panel: rgba(18, 24, 36, 0.82);
            --panel-strong: rgba(16, 21, 33, 0.92);
            --text: #d6deff;
            --muted: #7f8ba7;
            --accent: #73f8ff;
            --accent-2: #a673ff;
            --danger: #ff5fbf;
            --border: rgba(115, 248, 255, 0.3);
            --cursor-x: 50vw;
            --cursor-y: 50vh;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background:
                radial-gradient(1100px 700px at var(--cursor-x) var(--cursor-y), rgba(115, 248, 255, 0.09), transparent 55%),
                radial-gradient(800px 600px at 85% 10%, rgba(166, 115, 255, 0.1), transparent 60%),
                linear-gradient(130deg, var(--bg-0) 0%, var(--bg-1) 100%);
            color: var(--text);
            font-family: 'Consolas', 'Space Mono', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
            letter-spacing: 0.2px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(90deg, rgba(255, 95, 191, 0.03), rgba(115, 248, 255, 0.02) 25%, rgba(166, 115, 255, 0.03) 60%, rgba(255, 95, 191, 0.03));
            mix-blend-mode: screen;
            animation: hueShift 8s infinite linear;
            z-index: 1;
        }

        .fx-scanlines,
        .fx-noise,
        .fx-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .fx-scanlines {
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.03) 0px,
                rgba(255, 255, 255, 0.03) 1px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 3px
            );
            opacity: 0.22;
        }

        .fx-noise {
            background-image: radial-gradient(rgba(255, 255, 255, 0.09) 0.5px, transparent 0.5px);
            background-size: 3px 3px;
            opacity: 0.06;
            animation: noiseShift 0.18s infinite steps(2);
        }

        .fx-vignette {
            background: radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.45) 100%);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 3;
        }
        
        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--panel);
            backdrop-filter: blur(6px);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: "";
            position: absolute;
            inset: auto -40% 0 -40%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: edgeSweep 4s linear infinite;
        }
        
        .header-title {
            font-size: 3.5rem;
            font-weight: bold;
            color: #eaf0ff;
            text-shadow:
                0 0 12px rgba(115, 248, 255, 0.35),
                0 0 26px rgba(166, 115, 255, 0.22);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            animation: titleGlitch 5s infinite steps(2);
        }
        
        .header-subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        
        button {
            background: rgba(11, 16, 25, 0.85);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 10px 25px;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        button:hover,
        button.active {
            background: linear-gradient(135deg, rgba(115, 248, 255, 0.25), rgba(166, 115, 255, 0.25));
            color: #fff;
            box-shadow: 0 0 20px rgba(115, 248, 255, 0.28);
            transform: translateY(-1px);
        }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }
        
        .game-card {
            background: linear-gradient(165deg, var(--panel) 0%, var(--panel-strong) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 30px rgba(2, 4, 10, 0.35);
            animation: cardIn 0.45s ease both;
            animation-delay: calc(var(--i, 0) * 35ms);
            position: relative;
        }

        .game-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.1) 50%, transparent 65%);
            transform: translateX(-140%);
            transition: transform 0.5s ease;
            pointer-events: none;
        }
        
        .game-card:hover {
            box-shadow:
                0 0 0 1px rgba(166, 115, 255, 0.4),
                0 18px 38px rgba(0, 0, 0, 0.55),
                0 0 28px rgba(115, 248, 255, 0.24);
            transform: translateY(-6px) skewX(-0.5deg);
            border-color: rgba(166, 115, 255, 0.7);
        }

        .game-card:hover::before {
            transform: translateX(140%);
        }
        
        .game-thumbnail {
            width: 100%;
            height: 200px;
            background: #070b12;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .game-type {
            display: inline-block;
            background: linear-gradient(90deg, rgba(115, 248, 255, 0.9), rgba(166, 115, 255, 0.9));
            color: #070b12;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 8px;
            width: fit-content;
            text-transform: uppercase;
        }
        
        .game-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #eaf0ff;
            text-shadow: 0 0 16px rgba(115, 248, 255, 0.18);
        }
        
        .game-description {
            font-size: 0.85rem;
            color: #a9b2ca;
            line-height: 1.4;
            flex: 1;
            margin-bottom: 15px;
        }
        
        .game-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-play,
        .btn-download {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
        }
        
        .btn-play {
            background: linear-gradient(120deg, rgba(115, 248, 255, 0.82), rgba(166, 115, 255, 0.82));
            color: #061019;
        }
        
        .btn-play:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        
        .btn-download {
            background: linear-gradient(120deg, rgba(255, 95, 191, 0.86), rgba(166, 115, 255, 0.82));
            color: #f6f8ff;
        }
        
        .btn-download:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 4, 10, 0.82);
            animation: fadeIn 0.3s;
            backdrop-filter: blur(3px);
        }
        
        .modal-content {
            background: linear-gradient(160deg, rgba(17, 22, 34, 0.95), rgba(11, 15, 24, 0.96));
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(166, 115, 255, 0.45);
            width: 90%;
            max-width: 800px;
            border-radius: 12px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.55), 0 0 28px rgba(166, 115, 255, 0.2);
        }
        
        .close {
            color: var(--accent);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .close:hover {
            color: #ffffff;
            text-shadow: 0 0 14px rgba(115, 248, 255, 0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .support-section {
            text-align: center;
            padding: 40px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 60px 0;
        }
        
        .support-title {
            font-size: 1.8rem;
            color: #eaf0ff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .support-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-support {
            padding: 15px 40px;
            font-size: 1rem;
            background: linear-gradient(120deg, rgba(115, 248, 255, 0.85), rgba(166, 115, 255, 0.85));
            color: #08101a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .btn-support:hover {
            filter: brightness(1.08);
            box-shadow: 0 0 20px rgba(115, 248, 255, 0.35);
            transform: scale(1.03);
        }
        
        .coming-soon {
            background: linear-gradient(90deg, rgba(255, 95, 191, 0.85), rgba(166, 115, 255, 0.85));
            color: #f9fbff;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.7;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #66708a;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        body.scrolling .fx-scanlines,
        body.modal-open .fx-scanlines {
            opacity: 0.35;
        }

        body.scrolling .container {
            animation: microJitter 120ms steps(2) 1;
        }

        @keyframes noiseShift {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes hueShift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes edgeSweep {
            from { transform: translateX(-10%); opacity: 0.3; }
            50% { opacity: 0.85; }
            to { transform: translateX(10%); opacity: 0.3; }
        }

        @keyframes titleGlitch {
            0%, 95%, 100% { transform: translate(0); }
            96% { transform: translate(-1px, 0); }
            97% { transform: translate(1px, -1px); }
            98% { transform: translate(-1px, 1px); }
            99% { transform: translate(0, 0); }
        }

        @keyframes microJitter {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1px, 0); }
            50% { transform: translate(1px, 1px); }
            75% { transform: translate(0, -1px); }
            100% { transform: translate(0, 0); }
        }
        
        @media (max-width: 768px) {
            .header-title {
                font-size: 2rem;
            }
            
            .game-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="fx-scanlines"></div>
    <div class="fx-noise"></div>
    <div class="fx-vignette"></div>
    <div class="container">
        <header>
            <div class="header-title">⚔️ CRIMINALLY DEV DADS</div>
            <div class="header-subtitle">EST. 2026 // GAME HUB // INDIE COLLECTIVE</div>
        </header>
        
        <div class="filter-buttons">
            <button class="active" onclick="filterGames('all')">ALL</button>
            <button onclick="filterGames('game')">GAMES</button>
            <button onclick="filterGames('asset')">ASSETS</button>
        </div>
        
        <div class="game-grid" id="gameGrid"></div>
        
        <div class="support-section">
            <div class="support-title">Support the Devs</div>
            <p style="margin-bottom: 30px; color: #aaa; font-size: 0.95rem;">
                Love our games? Help us keep creating by supporting our work. <span class="coming-soon">COMING SOON</span>
            </p>
            <div class="support-buttons">
                <button class="btn-support" disabled style="opacity: 0.5;">💰 Donate</button>
                <button class="btn-support" disabled style="opacity: 0.5;">🛒 Merch Shop</button>
                <button class="btn-support" onclick="window.location.href='mailto:contact@criminallydevdads.com'">📧 Contact Us</button>
            </div>
        </div>
        
        <footer>
            © 2026 CRIMINALLY DEV DADS  // ALL RIGHTS RESERVED // STAY CRIMINAL
        </footer>
    </div>
    
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        let allGames = [];
        const REPO_OWNER = 'CDDdrifter';
        const REPO_NAME = 'criminallydevdads.com';

        function slugFromFilename(filename = '') {
            return filename.replace(/\.zip$/i, '');
        }

        function titleFromId(id = '') {
            return id
                .split('-')
                .filter(Boolean)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        async function pathExists(path) {
            try {
                const response = await fetch(path, { cache: 'no-store' });
                if (!response.ok) {
                    return false;
                }
                return true;
            } catch (error) {
                return false;
            }
        }

        async function resolveThumbnailFromIndexHtml(launchPath, folderId) {
            try {
                const response = await fetch(launchPath, { cache: 'no-store' });
                if (!response.ok) {
                    return '';
                }

                const html = await response.text();
                const candidates = [];
                const splashMatch = html.match(/id=["']status-splash["'][^>]*src=["']([^"']+)["']/i);
                if (splashMatch && splashMatch[1]) {
                    candidates.push(`games/${folderId}/${splashMatch[1]}`);
                }
                const iconMatch = html.match(/id=["']-gd-engine-icon["'][^>]*href=["']([^"']+)["']/i);
                if (iconMatch && iconMatch[1]) {
                    candidates.push(`games/${folderId}/${iconMatch[1]}`);
                }

                for (const candidate of candidates) {
                    if (await pathExists(candidate)) {
                        return candidate;
                    }
                }

                return '';
            } catch (error) {
                return '';
            }
        }

        async function loadOptionalMetadata() {
            try {
                const response = await fetch('games.json', { cache: 'no-store' });
                if (!response.ok) {
                    return [];
                }
                const data = await response.json();
                return Array.isArray(data) ? data : [];
            } catch (error) {
                return [];
            }
        }

        async function discoverGameFolders() {
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/games`;
            const response = await fetch(apiUrl, { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`Could not load game folders (${response.status})`);
            }

            const items = await response.json();
            if (!Array.isArray(items)) {
                return [];
            }

            return items
                .filter(item => item && item.type === 'dir' && item.name && !item.name.startsWith('.'))
                .map(item => item.name);
        }

        async function buildGameFromFolder(folderId, metadataById) {
            const metadata = metadataById[folderId] || {};
            const launchPath = `games/${folderId}/index.html`;
            const isPlayable = await pathExists(launchPath);
            const thumbnailCandidates = [
                `games/${folderId}/index.png`,
                `games/${folderId}/index.icon.png`,
                `games/${folderId}/icon.png`,
                `games/${folderId}/icon.svg`
            ];
            let resolvedThumbnail = '';
            for (const candidate of thumbnailCandidates) {
                if (await pathExists(candidate)) {
                    resolvedThumbnail = candidate;
                    break;
                }
            }

            if (!resolvedThumbnail && isPlayable) {
                resolvedThumbnail = await resolveThumbnailFromIndexHtml(launchPath, folderId);
            }

            return {
                id: folderId,
                type: metadata.type || 'game',
                title: metadata.title || titleFromId(folderId),
                description: metadata.description || 'Auto-discovered game build from the games folder.',
                details: metadata.details || 'This game was auto-added because a web build was detected in the games directory.',
                thumbnail: resolvedThumbnail || metadata.thumbnail || '',
                filename: metadata.filename || `${folderId}.zip`,
                url: metadata.url || '',
                launchPath,
                isPlayable
            };
        }

        async function loadGames() {
            const metadataList = await loadOptionalMetadata();
            const metadataById = metadataList.reduce((acc, game) => {
                const id = game.id || slugFromFilename(game.filename || '');
                if (id) {
                    acc[id] = game;
                }
                return acc;
            }, {});

            const folderIds = await discoverGameFolders();
            const discoveredGames = await Promise.all(folderIds.map(folderId => buildGameFromFolder(folderId, metadataById)));

            allGames = discoveredGames.sort((a, b) => a.title.localeCompare(b.title));
            renderGames('all');
        }

        loadGames().catch(error => {
            console.error('Error loading games:', error);
            document.getElementById('gameGrid').innerHTML = '<div class="empty-state">Error loading games. Check console.</div>';
        });
        
        function renderGames(type) {
            const gameGrid = document.getElementById('gameGrid');
            const filteredGames = type === 'all' ? allGames : allGames.filter(g => g.type === type);
            
            if (filteredGames.length === 0) {
                gameGrid.innerHTML = '<div class="empty-state">No games found in this category.</div>';
                return;
            }
            
            gameGrid.innerHTML = filteredGames.map((game, index) => `
                <div class="game-card" style="--i:${index};">
                    <div class="game-thumbnail">
                        ${game.thumbnail ? `<img src="${game.thumbnail}" alt="${game.title}" onerror="this.parentElement.innerHTML='🎮'">` : '🎮'}
                    </div>
                    <div class="game-info">
                        <div class="game-type">${game.type}</div>
                        <div class="game-title">${game.title}</div>
                        <div class="game-description">${game.description}</div>
                        <div class="game-actions">
                            <button class="btn-play" onclick="playGame('${game.id}', ${game.isPlayable})">${game.isPlayable ? 'Play Now' : 'Setup Needed'}</button>
                            <button class="btn-download" onclick="openModal('${game.id}')">Info</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterGames(type) {
            document.querySelectorAll('.filter-buttons button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGames(type);
        }
        
        function playGame(gameId, isPlayable = true) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) {
                return;
            }

            if (game.url) {
                window.location.href = game.url;
                return;
            }

            if (!isPlayable) {
                alert(`"${gameId}" was found in /games but no playable index file was found.\n\nExpected path:\n${game.launchPath}`);
                return;
            }

            window.location.href = game.launchPath;
        }
        
        function openModal(gameId) {
            const game = allGames.find(g => g.id === gameId);
            if (!game) return;
            
            const modal = document.getElementById('gameModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="color: #00ff88; margin-bottom: 20px;">${game.title}</h2>
                ${game.thumbnail ? `<img src="${game.thumbnail}" onerror="this.style.display='none'" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 6px; margin-bottom: 20px;">` : ''}
                <p style="margin-bottom: 15px; line-height: 1.6;">${game.details || game.description}</p>
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #00ff88;">
                    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
                        <strong>Type:</strong> ${game.type.toUpperCase()} | 
                        <strong>Folder:</strong> ${game.id}
                    </p>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <button onclick="playGame('${game.id}', ${game.isPlayable})" style="flex: 1; padding: 12px; background: #00ff88; color: #0a0e27; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">${game.isPlayable ? 'PLAY NOW' : 'SETUP NEEDED'}</button>
                        <button onclick="closeModal()" style="flex: 1; padding: 12px; background: #555; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">CLOSE</button>
                    </div>
                </div>
            `;
            
            modal.style.display = 'block';
            document.body.classList.add('modal-open');
        }
        
        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
            document.body.classList.remove('modal-open');
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                modal.style.display = 'none';
                document.body.classList.remove('modal-open');
            }
        }

        document.addEventListener('mousemove', (event) => {
            document.documentElement.style.setProperty('--cursor-x', `${event.clientX}px`);
            document.documentElement.style.setProperty('--cursor-y', `${event.clientY}px`);
        });

        let scrollFxTimeout;
        window.addEventListener('scroll', () => {
            document.body.classList.add('scrolling');
            clearTimeout(scrollFxTimeout);
            scrollFxTimeout = setTimeout(() => {
                document.body.classList.remove('scrolling');
            }, 120);
        }, { passive: true });
    </script>
</body>
</html>
