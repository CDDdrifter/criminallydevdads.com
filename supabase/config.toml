# Supabase CLI — https://supabase.com/docs/guides/cli
# Deploy Edge Function: supabase functions deploy sync-repo-to-github

[functions.sync-repo-to-github]
verify_jwt = true

# Guest checkout: buyers are not Supabase-authenticated. Security = published game row + server-side amount checks.
# JWT verification would block anonymous invokes from the anon client.
[functions.create-checkout-session]
verify_jwt = false
