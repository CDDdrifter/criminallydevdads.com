<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Green background -->
  <rect width="128" height="128" rx="16" ry="16" fill="#3a8c2f"/>

  <!-- Dirt block (bottom center) -->
  <rect x="40" y="88" width="48" height="28" rx="3" fill="#8b5a2b"/>
  <!-- Grass top on dirt block -->
  <rect x="40" y="88" width="48" height="8" rx="2" fill="#4caf27"/>
  <!-- Dirt block shading -->
  <rect x="40" y="96" width="48" height="20" rx="0" fill="#7a4e25"/>
  <rect x="40" y="88" width="4" height="28" fill="#9e6535" opacity="0.4"/>
  <rect x="84" y="88" width="4" height="28" fill="#5a3510" opacity="0.4"/>

  <!-- Tree trunk -->
  <rect x="57" y="52" width="14" height="40" rx="2" fill="#6b4220"/>
  <!-- Trunk shading -->
  <rect x="57" y="52" width="4" height="40" fill="#7d5030" opacity="0.5"/>
  <rect x="67" y="52" width="4" height="40" fill="#3d2010" opacity="0.5"/>
  <!-- Trunk rings hint -->
  <rect x="58" y="62" width="12" height="1" fill="#4a2c10" opacity="0.4"/>
  <rect x="58" y="74" width="12" height="1" fill="#4a2c10" opacity="0.4"/>
  <rect x="58" y="84" width="12" height="1" fill="#4a2c10" opacity="0.4"/>

  <!-- Leaf canopy: large green circle -->
  <circle cx="64" cy="36" r="30" fill="#2d8c18"/>
  <!-- Leaf highlights/variations -->
  <circle cx="50" cy="30" r="14" fill="#36a020" opacity="0.7"/>
  <circle cx="78" cy="30" r="14" fill="#36a020" opacity="0.7"/>
  <circle cx="64" cy="18" r="16" fill="#3db825" opacity="0.7"/>
  <!-- Leaf shadow at bottom of canopy -->
  <circle cx="64" cy="50" r="16" fill="#1e6010" opacity="0.4"/>
  <!-- Leaf shine -->
  <circle cx="55" cy="24" r="5" fill="#5dd43e" opacity="0.4"/>
</svg>
